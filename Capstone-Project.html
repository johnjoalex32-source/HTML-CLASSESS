<!DOCTYPE html>
<html>

<head>
    <title>Navbar</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .topnav {
            overflow: hidden;
            background-color: #002fff;
            
        }

        .topnav a {
             color: #1affa3;
            text-align: center;
            padding: 14x 16px;
            text-decoration: none;
            font-size: 27px;
            margin-right: 20px;
        }

        .topnav a:hover {
            background-color: #ddd;
            color: black;
        }

        .topnav a.active {
            background-color: #ff0000;
            color: black;
        }
    </style>
</head>

<body>
    <center>
    <div class="topnav">
        <a class="active" href="#home">Home</a>
        <a href="About-Me.html">AboutUs</a>
        <a href="#">Gallery</a>
        <a href="#">Contact Us</a>
    </div>
    </center>
</body>

</html>
