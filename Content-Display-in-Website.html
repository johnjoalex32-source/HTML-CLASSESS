<!DOCTYPE html>
<html>

<head>

    <style>
        body,
        html {

            height: 100%;

            margin: 0;

            font-family: Arial, Helvetica, sans-serif;

        }

        .pimg1,
        .pimg2,
        .pimg3 {
            position: relative;
            opacity: 0.70;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .pimg1 {
            background-image: url('princess-1440x630-ra (1).webp');
            min-height: 100%;
        }

        .pimg2 {
            background-image: url('cheetah.jpg');
            min-height: 400px;
        }

        .pimg3 {
            background-image: url('images (3).jpeg');
            min-height: 400px;
        }

        .section {
            text-align: center;
            padding: 50px 80px;
        }

        .section-light {
            background-color: #f4f4f4;
            color: #000000;
        }

        .section-dark {
            background-color: #282e34;
            color: #ddd
        }

        .ptext {
            position: absolute;
            top: 50%;
            width: 100%;
            text-align: center;
            color: #000;
            font-size: 27px;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .ptext .border {
            background-color: #111;
            color: #ffffff;
            padding: 20px;
        }

        .ptext .border.trans {
            background-color: transparent;
        }

        @media(max-width:568px) {

            .pimg1,
            .pimg2,
            .pimg3 {
                background-attachment: scroll;
            }
        }
    </style>
</head>

<body>
    <div class="pimg1">
        <div class="ptext">
            <span class="border trans" style="font-size: 40px;">
                <center>Welcome all to this Website.</center>
            </span><br>
        </div>
    </div>
    <section class="section section-dark">
        <h2>Section One</h2>
        <p>Web development is the work involved in developing a Web site for the Internet (World Wide Web) or an
            intranet (a private network).</p>
    </section>
    <div class="pimg3">
        <div class="ptext">
            <span class="border trans">Image Two Text</span>
        </div>
    </div>
</body>

</html>
