<!DOCTYPE html>
<html>

<head>
    <title>Digital-Clock-using-JS:</title>
    <style>
body{ 
background-color: aquamarine;
text-align: center;
}
h1{
    background-color: rgb(0, 136, 255);
}
div{
    background-color: rgb(0, 255, 251);
    font-size: xx-large;
}

    </style>
</head>

<body>
    <h1>Digital-Clock:</h1> 

    <div id="MyClockDisplay" onload="showTime()"></div>

    <script>
        function showTime() {
            var date = new Date();
            var h = date.getHours();
            var m = date.getMinutes();
            var s = date.getSeconds();
            var session = "AM";

            if (h > 12) {
                h = h - 12;
                session = "PM";
            }

            h = (h < 10) ? "0" + h : h;
            m = (m < 10) ? "0" + m : m;
            s = (s < 10) ? "0" + s : s;

            var time = h + ":" + m + ":" + s + " " + session;
            document.getElementById("MyClockDisplay").innerText = time;
            setTimeout(showTime, 1000);
        }

        showTime();
    </script>
</body>

</html>
