<!DOCTYPE html>
<html>

<head>
    <title>Website</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            font-size: 16px;
            font-family: "Lato", sans-serif;
            font-weight: 400;
            line-height: 1.8em;
            color: rgb(0, 0, 0);
            background-color: rgb(0, 255, 255);
        }

        .topnav {
            overflow: hidden;
            background-color: rgb(66, 103, 96);
        }

        .topnav a {
            display: inline;
            color: #1affa3;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }

        .topnav a:hover {
            background-color: #111;
        }

        .pimg1,
        .pimg2,
        .pimg3 {
            position: relative;
            opacity: 0.70;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .pimg1 {
            background-image: url('spiderman-suit-icon-logo-super-260nw-2407844867.webp');
            min-height: 100%;
        }

        .pimg2 {
            background-image: url('Jaguar-01-01.webp');
            min-height: 400px;
        }

        .pimg3 {
            background-image: url('spino_orig.gif');
            min-height: 400px;
        }

        .section {
            text-align: center;
            padding: 50px 80px;
        }

        .section-light {
            background-color: #f4f4f4;
            color: #000000
        }

        .section-dark {
            background-color: #161816;
            color: #ddd;
        }

        .ptext {
            position: absolute;
            top: 50%;
            width: 100%;
            text-align: center;
            color: #000;
            font-size: 27px;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .ptext .border {
            background-color: #111;
            color: #fff;
            padding: 20px;
        }

        .ptext .border.trans {
            background-color: transparent;
        }

        @media(max-width:568px) {

            .pimg1,
            .pimg2,
            .pimg3 {
                background-attachment: scroll;
            }
        }
    </style>
</head>

<body>
    <div class="topnav">
        <a class="active" href="home">Home</a>
        <a class="About-Me.html">About-Us</a>
        <a class="#contact">Gallery</a>
        <a class="#contact">Contact-Us</a>
    </div><br>

    <div class="pimg1">
        <div class="ptext">
            <span class="border trans">Image One Text</span>
            <span class="border trans" style="font-size: 40px;">
                <center>Welcome all to this Website</center>
            </span><br>
        </div>
    </div>

    <section class="section section-dark">
        <h2>Section One</h2>
        <p>Web development is the work involved in developing a Web site for the Internet (World Wide Web) or an
            intranet (a private network).</p>
    </section>

    <div class="pimg2">
        <div class="ptext">
            <span class="border trans">Image Two Text</span>
        </div>
    </div>

    <div class="pimg3">
        <div class="ptext">
            <span class="border trans">Image Three Text</span>
        </div>
    </div>

    <section class="section section-dark">
        <span>All @copy rights reserved by Swati Singh</span>
    </section>

    <section>
        <img class="mySlides" src="spiderman-suit-icon-logo-super-260nw-2407844867.webp"
            style="height:500px; width: 1340px;">
        <img class="mySlides" src="Jaguar-01-01.webp" style="height:500px; width: 1340px;">
        <img class="mySlides" src="spino_orig.gif" style="height:500px; width: 1340px;">
    </section>

    <script>
        // Automatic Slideshow - change every 3 seconds
        var myIndex = 0;
        carousel();

        function carousel() {
            var i;
            var x = document.getElementsByClassName("mySlides");
            for (i = 0; i < x.length; i++) {
                x[i].style.display = "none";
            }
            myIndex++;
            if (myIndex > x.length) { myIndex = 1 }
            x[myIndex - 1].style.display = "block";
            setTimeout(carousel, 3000);
        }
    </script>
</body>

</html>
