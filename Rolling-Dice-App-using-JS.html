<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            text-align: center;
            font-family: Helvetica, sans-serif;
        }

        #dice {
            font-size: 320px;
        }

        #dice:hover {
            cursor: pointer;
        }

    
    </style>
</head>

<body style=" background-color: #00f7ff;">
<h1 style="color: blue; background-color: aquamarine; font-size: 50px;">Roll-Dice App:</h1>
    <div style="background-color: rgb(17, 255, 0); color: #000000; font-size: 40px;">Click on the dice...</div>
    <div id="dice" onclick="stopStart()"></div>

    <script>
        // dice image from value 1 to 6 are given in an array, codes are from Die face Emojipedia
        var dices = ['&#9856', '&#9857', '&#9858', '&#9859', '&#9860', '&#9861;'];
        var stopped = true;

        // for keep on changing the dice emojis
        function change() {
            var random = Math.floor(Math.random() * 6);
            dice.innerHTML = dices[random];
        }

        function stopStart() {
            if (stopped) {
                stopped = false;
                // change function is called here to change the image for every 0.1 seconds
                t = setInterval(change, 100);
            } else {
                clearInterval(t);
                stopped = true;
            }
        }

        // invoking function
        window.onload = function() {
            dice = document.getElementById("dice");
            stopStart();
        }
    </script>
</body>

</html>
