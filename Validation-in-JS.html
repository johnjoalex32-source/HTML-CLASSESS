<!DOCTYPE html>
<html>

<head>

    <script>
        function validateForm() {
            var x = document.forms["myForm"]["fname"].value;
            if (x == "") {
                alert("Name must be filled out");
                return false;
            }
        }
    </script>
</head>

<body>

    <form name="myForm" onsubmit="return validateForm()">
        Name: <input type="text" name="fname">
        <input type="submit" value="Submit">
    </form>

    <p id="message"></p>


    <p>Enter a number and click OK:</p>

    <input id="id" type="number" min="100" max="300" required>

    <button onclick="myFunction()">OK</button>

    <p>If the number is less than 100 or greater 300,an error message will be displayed.</p>

    <p id="result"></p>

    <script>
        function myFunction() {
            var inpobj = document.getElementById("id");

            if (!inpobj.checkValidity()) {
                document.getElementById("result").innerHTML = inpobj.validationMessage;
            } else {
                document.getElementById("result").innerHTML = "Input OK";
            }
        }
    </script>
</body>

</html>
